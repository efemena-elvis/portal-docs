name: _Deploy app to Vercel (reusable)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      app_path:
        required: true
        type: string
      production_branch:
        required: true
        type: string
      production_url:
        required: true
        type: string
      is_production:
        required: true
        type: boolean
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      ADMIN_ACCESS_CODE:
        required: false
      ADMIN_JWT_SECRET:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      R2_BUCKET_NAME:
        required: false
      R2_ENDPOINT:
        required: false

jobs:
  deploy:
    name: ${{ inputs.is_production && 'Production' || 'Preview' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.is_production && 'production' || 'preview' }}
      url: ${{ inputs.is_production && inputs.production_url || steps.deploy.outputs.preview_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=${{ inputs.is_production && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --cwd=${{ inputs.app_path }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel
        run: |
          vercel build \
            ${{ inputs.is_production && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --cwd=${{ inputs.app_path }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ADMIN_ACCESS_CODE: ${{ secrets.ADMIN_ACCESS_CODE }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Deploy prebuilt output
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt \
            ${{ inputs.is_production && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --cwd=${{ inputs.app_path }})
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
